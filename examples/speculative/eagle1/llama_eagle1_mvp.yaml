recipe: TrainEagle1Recipe

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.2-1B
  train_data_path: /path/to/train.jsonl
  val_data_path: null
  train_split: null
  val_split: null
  output_dir: ./outputs/eagle1_llama_mvp
  seq_length: 1024
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  draft_num_hidden_layers: 1
  hidden_loss_weight: 1.0
  token_loss_weight: 0.1
  freeze_embeddings: true
  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle1_llama_mvp/checkpoints
  model_save_format: safetensors
  save_consolidated: true
  # restore_from: LATEST  # set to "LATEST", a subdir name like "epoch_1_step_100", or an absolute path
