# QuACK fused RoPE; compare with llama3_1_8b_quack_rope_baseline.yaml.
recipe: BenchmarkingRecipeForNextTokenPrediction
seed: 1234

benchmark:
  warmup_steps: 10
  peak_tflops: 989
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 1

step_scheduler:
  gc_every_steps: 10
  global_batch_size: 128
  local_batch_size: 1
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false
  activation_checkpointing: true

dist_env:
  backend: nccl
  timeout_minutes: 10

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: meta-llama/Llama-3.1-8B
  trust_remote_code: true
  output_hidden_states: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    rope: quack
    rope_fusion: false
    experts: torch
    dispatcher: torch

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 100000

dataloader:
  batch_size: null
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 0.0001
  weight_decay: 0

ci:
  recipe_owner: akoumpa
  time: "01:00:00"
  nodes: 1
