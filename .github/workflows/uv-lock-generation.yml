name: Generate Uv lock

on:
  pull_request:
    paths:
      - 'pyproject.toml'

jobs:
  check_uv_lock_and_update:
    if: github.repository == 'NVIDIA-NeMo/Automodel'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CAN_PUSH_LOCKS: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: ${{ env.CAN_PUSH_LOCKS }}
          token: ${{ env.CAN_PUSH_LOCKS == 'true' && secrets.PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Set up UV
        uses: astral-sh/setup-uv@v1
        with:
          version: 0.8.22

      - name: Check or update uv lock files
        run: |
          set -e

          check_or_update_lock() {
            lock_name="$1"

            if uv lock --check; then
              echo "$lock_name is up to date"
            elif [ "$CAN_PUSH_LOCKS" = "true" ]; then
              echo "Updating $lock_name"
              uv lock
            else
              echo "::error::$lock_name is out of date. Run the lock update flow in CONTRIBUTING.md and commit the generated lock files."
              exit 1
            fi
          }

          check_or_update_lock "Uv lock file"

          mv uv.lock uv_main.lock
          bash docker/common/update_pyproject_pytorch.sh "$GITHUB_WORKSPACE"
          check_or_update_lock "Uv PyTorch lock file"
          if [ "$CAN_PUSH_LOCKS" = "true" ]; then
            mv uv.lock docker/common/uv-pytorch.lock
          fi
          mv uv_main.lock uv.lock

      - name: Commit and push uv lock updates
        if: env.CAN_PUSH_LOCKS == 'true'
        run: |
          git config --global user.email "nemo-bot@nvidia.com"
          git config --global user.name "NeMo Bot"

          if git diff --quiet uv.lock docker/common/uv-pytorch.lock; then
            echo "No changes to commit"
          else
            git add uv.lock docker/common/uv-pytorch.lock
            git commit --signoff -m "Update uv lock"
            git push
          fi
