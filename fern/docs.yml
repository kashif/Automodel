instances:
- url: https://nemo-automodel.docs.buildwithfern.com/nemo/automodel
  custom-domain: docs.nvidia.com/nemo/automodel
title: NVIDIA NeMo AutoModel
footer: ./components/CustomFooter.tsx
layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true
colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'
theme:
  page-actions: toolbar
  footer-nav: minimal
logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: NeMo AutoModel
favicon: ./assets/NVIDIA_symbol.svg
js:
- url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
  strategy: beforeInteractive
css:
- ./main.css
navbar-links:
- type: github
  value: https://github.com/NVIDIA-NeMo/Automodel
libraries:
  nemo-automodel:
    input:
      git: https://github.com/NVIDIA-NeMo/Automodel
      subpath: nemo_automodel
    output:
      path: ./product-docs/nemo-automodel/Full-Library-Reference
    lang: python

experimental:
  mdx-components:
  - ./components
  basepath-aware: true

versions:
  - display-name: Nightly
    slug: nightly
    path: ./versions/nightly.yml
    availability: beta
  - display-name: Latest
    slug: latest
    path: ./versions/latest.yml
    availability: stable
  - display-name: "0.4.0 · 26.04"
    slug: v0.4
    path: ./versions/v0.4.yml
    availability: stable

redirects:
  # Generated by utils/generate_redirects.py — re-run from repo root; see scripts README
  - source: "/nemo/automodel/index.html"
    destination: "/nemo/automodel/v0.4"
  - source: "/nemo/automodel/index"
    destination: "/nemo/automodel/v0.4"
  # Version-root index.html / index — explicit because :path* does not match
  # the empty-path case (NVIDIA-NeMo/Curator#1938). Must fire before the
  # :path*/index.html catch-alls below.
  - source: "/nemo/automodel/latest/index.html"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/latest/index"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/v0.4/index.html"
    destination: "/nemo/automodel/v0.4"
  - source: "/nemo/automodel/v0.4/index"
    destination: "/nemo/automodel/v0.4"
  - source: "/nemo/automodel/nightly/index.html"
    destination: "/nemo/automodel/nightly"
  - source: "/nemo/automodel/nightly/index"
    destination: "/nemo/automodel/nightly"
  - source: "/nemo/automodel/0.4/index.html"
    destination: "/nemo/automodel/v0.4"
  - source: "/nemo/automodel/0.4/index"
    destination: "/nemo/automodel/v0.4"
  # Older un-migrated versions (0.3.0, 0.2.0, 0.1.0) — fold all paths into
  # /latest/<same-path>. We don't host their content trees on Fern; this
  # keeps old bookmarks and search-engine results landing on the closest
  # equivalent on the new site instead of 404ing. Per the :path*-doesn't-
  # match-empty-path quirk, the per-version-root /index.html and /index
  # forms each need an explicit rule and must fire before the catch-alls.
  - source: "/nemo/automodel/0.3.0/index.html"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.3.0/index"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.2.0/index.html"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.2.0/index"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.1.0/index.html"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.1.0/index"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/v0.4/:path*/index.html"
    destination: "/nemo/automodel/v0.4/:path*"
  - source: "/nemo/automodel/0.4/:path*/index.html"
    destination: "/nemo/automodel/v0.4/:path*"
  - source: "/nemo/automodel/0.3.0/:path*/index.html"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.2.0/:path*/index.html"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.1.0/:path*/index.html"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.4"
    destination: "/nemo/automodel/v0.4"
  - source: "/nemo/automodel/0.4/:path*"
    destination: "/nemo/automodel/v0.4/:path*"
  - source: "/nemo/automodel/0.3.0"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.3.0/:path*"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.2.0"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.2.0/:path*"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.1.0"
    destination: "/nemo/automodel/latest"
  - source: "/nemo/automodel/0.1.0/:path*"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/:path*/index.html"
    destination: "/nemo/automodel/:path*"
  # Sphinx page URLs (foo.html); must follow all :path*/index.html rules above
  - source: "/nemo/automodel/0.4/:path*.html"
    destination: "/nemo/automodel/v0.4/:path*"
  - source: "/nemo/automodel/0.3.0/:path*.html"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.2.0/:path*.html"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/0.1.0/:path*.html"
    destination: "/nemo/automodel/latest/:path*"
  - source: "/nemo/automodel/:path*.html"
    destination: "/nemo/automodel/:path*"
